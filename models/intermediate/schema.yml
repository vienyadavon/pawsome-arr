version: 2

models:
  - name: int_accounts_enriched
    description: "Accounts joined with subscriptions and user summary metrics. One row per account."
    columns:
      - name: account_id
        description: "Primary key — unique identifier for each account."
        tests:
          - not_null

  - name: int_alerts_enriched
    description: "Alerts joined with account tier and region context."
    columns:
      - name: alert_id
        description: "Primary key — unique identifier for each alert."
        tests:
          - not_null

