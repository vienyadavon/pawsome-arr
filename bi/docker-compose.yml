version: '3.8'
services:
  postgres_db:
    image: postgres:latest
    container_name: pawsome_arr_postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: pawsome_arr
      POSTGRES_USER: postgres
    ports:
      - "5435:5432"
    volumes:
      - pawsome_arr_pgdata:/var/lib/postgresql
    networks:
      - arr_analytics_net

  metabase_app:
    image: metabase/metabase:latest
    container_name: pawsome_arr_metabase
    restart: always
    ports:
      - "3001:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - pawsome_arr_metabase_data:/metabase-data
    depends_on:
      - postgres_db
    networks:
      - arr_analytics_net

volumes:
  pawsome_arr_pgdata:
  pawsome_arr_metabase_data:

networks:
  arr_analytics_net:
    driver: bridge
